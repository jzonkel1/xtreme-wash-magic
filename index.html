      Icons are generated from Eric's flame mark (the same one on the logo tile).
      %BASE_URL% matters: GitHub Pages serves this site from /xtreme-wash-magic/,
      so a hard-coded "/favicon.ico" 404s there. Vite substitutes the real base.

      apple-touch-icon MUST be a PNG — iOS ignores SVG here, and this used to
      point at favicon.svg, which means an iPhone home-screen bookmark got a
      blank icon. It's also opaque and inset, because iOS rounds the corners and
      does not honour transparency.
    -->
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" sizes="any" />

    <link rel="icon" type="image/png" sizes="48x48" href="%BASE_URL%favicon-48x48.png" />

    <script>
      // LeadConnector (GHL) chat widget — injected lazily, three rules:
      // 1. navigator.webdriver guard: the prerenderer (Puppeteer) must never
      //    load it, or all 36 static snapshots get widget DOM baked in.
      // 2. Wait for load + idle so the widget never competes with the page
      //    for bandwidth (Lighthouse stays honest).
      // 3. First tap/scroll also triggers it, so a fast-moving visitor still
      //    gets the bubble promptly.
      (function () {
        // OFF as of 2026-07-14, deliberately. The widget we have is an SMS/Email
        // chat: GHL's own docs say it "collects the visitor's information so you
        // can respond via SMS or email later" — i.e. it takes a phone number in
        // order to TEXT them. That is a second SMS opt-in path on every page,
        // with no consent disclosure of its own (the widget has no SMS consent
        // checkbox option), while our A2P campaign is registered on WEBSITE FORM
        // opt-in via the two checkboxes in SmsConsentFields.tsx. Two competing
        // consent mechanisms is exactly what gets a campaign rejected.
        //
        // TO RE-ENABLE: build an All-in-One widget in GHL with Chat Type =
        // Live Chat (conversation stays in the browser, nothing is texted, so it
        // is not an opt-in path), drop its widget id in below, and flip this to
        // true. Do NOT re-enable an SMS/Email-type widget.
        var ENABLE_CHAT_WIDGET = false;
        if (!ENABLE_CHAT_WIDGET) return;
        if (navigator.webdriver) return;
        var loaded = false;
        function loadWidget() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement("script");
          s.src = "https://widgets.leadconnectorhq.com/loader.js";
          s.setAttribute(
            "data-resources-url",
            "https://widgets.leadconnectorhq.com/chat-widget/loader.js"
          );
          s.setAttribute("data-widget-id", "6a55b04ed166a8719f20e1ef");
          s.setAttribute("data-source", "WEB_USER");
          document.body.appendChild(s);
          liftAboveMobileBar();
        }
        // On mobile the site has a sticky CALL/TEXT + BOOK bar. The widget bubble
        // defaults to bottom:20px inside its (open) shadow root, which parks it
        // on top of the BOOK button. Page CSS can't reach into a shadow root, so
        // inject the offset directly once the root exists.
        //
        // The offset MUST be safe-area-aware. The bar is 48px + the iPhone home
        // indicator inset (~34px), so a flat 88px left roughly 6px of clearance
        // on a real iPhone — it read as sitting right on the button. calc() with
        // env() tracks the inset on every device instead of guessing.
        function liftAboveMobileBar() {
          var tries = 0;
          var t = setInterval(function () {
            var host = document.querySelector("chat-widget");
            var root = host && host.shadowRoot;
            if (root) {
              clearInterval(t);
              var css = document.createElement("style");
              css.textContent =
                "@media (max-width: 767px){.lc_text-widget,.lc_text-widget--bubble," +
                ".lc_text-widget_prompt{bottom:calc(84px + env(safe-area-inset-bottom)) !important;}}";
              root.appendChild(css);
            } else if (++tries > 100) {
              clearInterval(t);
            }
          }, 200);
        }
        ["pointerdown", "scroll", "keydown", "touchstart"].forEach(function (e) {
          window.addEventListener(e, loadWidget, { once: true, passive: true });
        });
        window.addEventListener("load", function () {
          setTimeout(loadWidget, 3500);
        });
      })();
    </script>
