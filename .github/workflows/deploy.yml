name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Fail the deploy rather than publish a bare SPA shell if the prerender
      # silently skipped itself (see scripts/verify-prerender.mjs).
      - run: node scripts/verify-prerender.mjs
        env:
          GHPAGES: "1" # vite.config.ts switches base to /xtreme-wash-magic/
      # SPA fallback so any deep link resolves instead of a GitHub 404
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
